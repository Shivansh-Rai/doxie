<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} · DOXIE by Shivansh</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <header class="top-nav">
    <a href="/" class="brand">
      <span class="brand-mark"></span>
      <span class="brand-text">DOXIE</span>
      <span class="brand-tag">Your Local AI</span>
    </a>
    <nav class="nav-links">
      <a href="/" class="nav-link {% if nav_doc %}is-active{% endif %}">DoQnA</a>
      <a href="/resume" class="nav-link {% if nav_resume %}is-active{% endif %}">Resume Analyzer</a>
    </nav>
    <div class="nav-meta">
      <span class="pill">Offline • Ollama by Shivansh</span>
    </div>
  </header>
  <main class="main-shell">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p> Made By <a href="https://portfolio-shivanshrai.vercel.app/">Shivansh Rai</a> </p>
  </footer>
</body>
</html>
